<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAMPLE</title>
    <meta name="description" content="Live clock and calendar." />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero-time">
        <p class="eyebrow">SAMPLE</p>
        <div id="clock" class="clock">00:00:00</div>
        <div id="date-line" class="date-line">0000. 00. 00. Monday</div>
      </section>

      <section class="widget-row">
        <article class="calendar-card stack-a" id="calendar-card">
          <div class="calendar-header">
            <button id="prev-month" class="nav-btn" aria-label="previous month">‹</button>
            <div id="calendar-title" class="calendar-title">0000년 00월</div>
            <button id="next-month" class="nav-btn" aria-label="next month">›</button>
          </div>
          <div class="weekdays">
            <span id="wd0">Sun</span>
            <span id="wd1">Mon</span>
            <span id="wd2">Tue</span>
            <span id="wd3">Wed</span>
            <span id="wd4">Thu</span>
            <span id="wd5">Fri</span>
            <span id="wd6">Sat</span>
          </div>
          <div id="calendar-grid" class="calendar-grid"></div>
        </article>
      </section>
    </main>

    <script>
      const clockEl = document.getElementById('clock');
      const dateLineEl = document.getElementById('date-line');
      const calendarTitleEl = document.getElementById('calendar-title');
      const calendarGridEl = document.getElementById('calendar-grid');
      const calendarCardEl = document.getElementById('calendar-card');
      const prevBtn = document.getElementById('prev-month');
      const nextBtn = document.getElementById('next-month');

      const locale = (navigator.language || 'en').toLowerCase();
      const isKorean = locale.startsWith('ko');
      const weekdayKo = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
      const weekdayEn = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      const monthState = { year: new Date().getFullYear(), month: new Date().getMonth() };

      function pad(n) {
        return String(n).padStart(2, '0');
      }

      function updateClock() {
        const now = new Date();
        clockEl.textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
        dateLineEl.textContent = isKorean
          ? `${now.getFullYear()}. ${pad(now.getMonth() + 1)}. ${pad(now.getDate())}. ${weekdayKo[now.getDay()]}`
          : `${now.getFullYear()}. ${pad(now.getMonth() + 1)}. ${pad(now.getDate())}. ${weekdayEn[now.getDay()]}`;
      }

      function renderCalendar() {
        const { year, month } = monthState;
        const firstDay = new Date(year, month, 1);
        const lastDate = new Date(year, month + 1, 0).getDate();
        const startWeekday = firstDay.getDay();
        const today = new Date();

        calendarTitleEl.textContent = isKorean
          ? `${year}년 ${pad(month + 1)}월`
          : `${year} / ${pad(month + 1)}`;
        calendarGridEl.innerHTML = '';

        for (let i = 0; i < startWeekday; i += 1) {
          const empty = document.createElement('div');
          empty.className = 'day empty';
          calendarGridEl.appendChild(empty);
        }

        for (let day = 1; day <= lastDate; day += 1) {
          const cell = document.createElement('div');
          cell.className = 'day';
          cell.textContent = day;

          const isToday =
            year === today.getFullYear() &&
            month === today.getMonth() &&
            day === today.getDate();

          if (isToday) {
            cell.classList.add('today');
          }

          calendarGridEl.appendChild(cell);
        }
      }

      function rotateStack() {
        if (calendarCardEl.classList.contains('sliding')) return;
        calendarCardEl.classList.add('sliding');
        calendarCardEl.classList.remove('tap');
        void calendarCardEl.offsetWidth;
        calendarCardEl.classList.add('tap');
      }

      prevBtn.addEventListener('click', (event) => {
        event.stopPropagation();
        monthState.month -= 1;
        if (monthState.month < 0) {
          monthState.month = 11;
          monthState.year -= 1;
        }
        renderCalendar();
        rotateStack();
      });

      nextBtn.addEventListener('click', (event) => {
        event.stopPropagation();
        monthState.month += 1;
        if (monthState.month > 11) {
          monthState.month = 0;
          monthState.year += 1;
        }
        renderCalendar();
        rotateStack();
      });

      calendarCardEl.addEventListener('animationend', (event) => {
        if (event.animationName === 'cardSlide') {
          if (calendarCardEl.classList.contains('stack-a')) {
            calendarCardEl.classList.remove('stack-a');
            calendarCardEl.classList.add('stack-b');
          } else if (calendarCardEl.classList.contains('stack-b')) {
            calendarCardEl.classList.remove('stack-b');
            calendarCardEl.classList.add('stack-c');
          } else {
            calendarCardEl.classList.remove('stack-c');
            calendarCardEl.classList.add('stack-a');
          }
          calendarCardEl.classList.remove('sliding');
          calendarCardEl.classList.remove('tap');
        }
      });

      const weekdayShortKo = ['일', '월', '화', '수', '목', '금', '토'];
      const weekdayShortEn = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      const weekdayLabels = isKorean ? weekdayShortKo : weekdayShortEn;
      weekdayLabels.forEach((label, index) => {
        document.getElementById(`wd${index}`).textContent = label;
      });

      updateClock();
      renderCalendar();
      setInterval(updateClock, 1000);
    </script>
  </body>
</html>
