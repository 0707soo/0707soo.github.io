name: Update Mabinogi Notices

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install --upgrade pip requests

      - name: Fetch latest notices
        run: python scripts/fetch_notices.py

      - name: Commit updated notice data
        run: |
          if git diff --quiet notices.json; then
            echo "No notice changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add notices.json
          git commit -m "chore: update mabinogi notices"
          git push
